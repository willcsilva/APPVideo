apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: willcsilva/auth-service:latest
          ports:
            - containerPort: 3001

          env:
            # ✅ AMBIENTE
            - name: NODE_ENV
              value: "stage"

            # ✅ APP
            - name: PORT
              value: "3001"

            # ✅ DATABASE
            - name: DB_HOST
              value: postgres.infra.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: video_processor
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: admin123

            # ✅ JWT
            - name: JWT_SECRET
              value: minha-chave-jwt-dev

            # ✅ NEW RELIC
            - name: NEW_RELIC_LICENSE_KEY
              value: "${NEW_RELIC_LICENSE_KEY}"

            # ✅ AWS (LOCALSTACK)
            - name: AWS_REGION
              value: us-east-1

            - name: AWS_ENDPOINT
              value: http://localstack.infra.svc.cluster.local:4566