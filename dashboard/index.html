<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 Soat Videos - FIAP Hackton - 13 Soat Videos </title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🎬 13 Soat Videos - FIAP Hackton - 13 Soat Videos </h1>
    <p>Processamento Distribuído de Vídeos</p>
  </header>

  <div class="container">

    <div class="card">

      <h2>🔐 Login</h2>

      <input
        type="email"
        id="email"
        placeholder="Email">

      <input
        type="password"
        id="password"
        placeholder="Senha">

      <button
        id="login-btn"
        onclick="login()"
      >
        Entrar
      </button>

      <button
        id="register-btn"
        onclick="register()"
        class="register-btn"
      >
        Criar Conta
      </button>

      <button
        id="logout-btn"
        onclick="logout()"
        style="display:none;"
      >
        Sair
      </button>

      <div id="login-status"></div>

    </div>

    <div class="card">

      <h2>📤 Upload de Vídeo</h2>

      <input
        type="file"
        id="videoFile"
        multiple
        accept=".mp4,.mov,video/mp4,video/quicktime">

      <button onclick="uploadVideo()">
        Enviar Vídeo
      </button>

      <div id="upload-result"></div>

    </div>

    <div class="card">

      <h2>📊 Infraestrutura</h2>

      <div id="infra-status">

        Carregando...

      </div>

    </div>

    <div class="card large">

      <h2>🎞 Histórico de Vídeos</h2>

      <table>

        <thead>
          <tr>
            <th>Arquivo</th>
            <th>Status</th>
            <th>ZIP</th>
          </tr>
        </thead>

        <tbody id="video-table">

        </tbody>

      </table>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
