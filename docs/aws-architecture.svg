<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Diagrama de Arquitetura AWS APPVideo">
  <!-- Background -->
  <rect width="1600" height="900" fill="#232f3e"/>
  
  <!-- AWS Orange gradient -->
  <defs>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="awsBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f5a96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#146eb4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <rect x="30" y="20" width="1540" height="70" rx="8" fill="#FF9900" opacity="0.15"/>
  <text x="60" y="65" font-family="Amazon Ember, Arial, sans-serif" font-size="36" font-weight="700" fill="#FF9900">APPVideo - Arquitetura em Kubernetes</text>
  
  <!-- AWS Region Container -->
  <rect x="40" y="110" width="1520" height="770" rx="12" fill="none" stroke="#FF9900" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="60" y="140" font-family="Amazon Ember, Arial, sans-serif" font-size="16" fill="#FF9900" font-weight="700">AWS Region / Kubernetes Cluster</text>
  
  <!-- Client Layer -->
  <rect x="60" y="170" width="180" height="100" rx="8" fill="#FF9900" opacity="0.2" stroke="#FF9900" stroke-width="2"/>
  <text x="100" y="205" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">👤 CLIENT</text>
  <text x="75" y="230" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Web/API</text>
  <text x="75" y="250" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Request</text>
  
  <!-- Auth Service -->
  <rect x="340" y="150" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="360" y="185" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">🔐 AUTH</text>
  <text x="355" y="210" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Service (Node.js)</text>
  <text x="355" y="230" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">JWT</text>
  
  <!-- Upload Service -->
  <rect x="340" y="290" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="345" y="325" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">📤 UPLOAD</text>
  <text x="350" y="350" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Service (Node.js)</text>
  <text x="360" y="370" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">S3 Push</text>
  
  <!-- Status Service -->
  <rect x="340" y="430" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="350" y="465" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">📊 STATUS</text>
  <text x="350" y="490" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Service (Node.js)</text>
  <text x="365" y="510" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Health Check</text>
  
  <!-- SQS Queue -->
  <rect x="600" y="260" width="160" height="100" rx="8" fill="#FF9900" opacity="0.3" stroke="#FF9900" stroke-width="2"/>
  <text x="635" y="295" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">📬 SQS</text>
  <text x="620" y="320" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Message Queue</text>
  <text x="625" y="340" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Async Jobs</text>
  
  <!-- Video Worker -->
  <rect x="840" y="150" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="860" y="185" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">🎬 WORKER</text>
  <text x="860" y="210" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">FFmpeg Process</text>
  <text x="860" y="230" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Frame Extract</text>
  
  <!-- Zip Service -->
  <rect x="840" y="290" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="870" y="325" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">🗜️ ZIP</text>
  <text x="855" y="350" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Service (Node.js)</text>
  <text x="855" y="370" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Compress</text>
  
  <!-- Notification Service -->
  <rect x="1080" y="220" width="160" height="100" rx="8" fill="url(#awsBlue)" stroke="#146eb4" stroke-width="2"/>
  <text x="1100" y="255" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">📧 NOTIFY</text>
  <text x="1095" y="280" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Service (Node.js)</text>
  <text x="1105" y="300" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">E-mail/SES</text>
  
  <!-- S3 Storage -->
  <rect x="600" y="430" width="160" height="100" rx="8" fill="#FF9900" opacity="0.3" stroke="#FF9900" stroke-width="2"/>
  <text x="655" y="465" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">🪣 S3</text>
  <text x="630" y="490" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Video Storage</text>
  <text x="640" y="510" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">LocalStack</text>
  
  <!-- PostgreSQL -->
  <rect x="840" y="430" width="160" height="100" rx="8" fill="#FF9900" opacity="0.3" stroke="#FF9900" stroke-width="2"/>
  <text x="865" y="465" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">🗄️ RDS</text>
  <text x="850" y="490" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">PostgreSQL</text>
  <text x="860" y="510" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Database</text>
  
  <!-- Redis Cache -->
  <rect x="1080" y="430" width="160" height="100" rx="8" fill="#FF9900" opacity="0.3" stroke="#FF9900" stroke-width="2"/>
  <text x="1130" y="465" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">⚡ Cache</text>
  <text x="1110" y="490" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Redis</text>
  <text x="1115" y="510" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">ElastiCache</text>
  
  <!-- Load Balancer -->
  <rect x="1320" y="220" width="160" height="100" rx="8" fill="#FF9900" opacity="0.2" stroke="#FF9900" stroke-width="2"/>
  <text x="1345" y="255" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">⚖️ ALB</text>
  <text x="1330" y="280" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Application</text>
  <text x="1335" y="300" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#cccccc">Load Balancer</text>
  
  <!-- Arrows with labels -->
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF9900"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Client to Auth -->
  <line x1="240" y1="200" x2="340" y2="190" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="270" y="185" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#FF9900">autenticação</text>
  
  <!-- Client to Upload -->
  <line x1="240" y1="220" x2="340" y2="310" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="260" y="280" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#FF9900">upload</text>
  
  <!-- Client to Status -->
  <line x1="240" y1="240" x2="340" y2="470" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="260" y="370" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#FF9900">consulta</text>
  
  <!-- Upload to SQS -->
  <line x1="500" y1="320" x2="600" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="535" y="305" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">envia job</text>
  
  <!-- Upload to S3 -->
  <line x1="500" y1="340" x2="600" y2="380" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="530" y="370" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">armazena</text>
  
  <!-- SQS to Worker -->
  <line x1="760" y1="290" x2="840" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="780" y="235" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">processa</text>
  
  <!-- Worker to DB -->
  <line x1="920" y1="250" x2="920" y2="430" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="930" y="340" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">salva</text>
  
  <!-- Worker to Zip -->
  <line x1="900" y1="250" x2="900" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="910" y="272" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">next</text>
  
  <!-- Zip to S3 -->
  <line x1="840" y1="350" x2="760" y2="400" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="795" y="365" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">compacta</text>
  
  <!-- Zip to Notify -->
  <line x1="1000" y1="330" x2="1080" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="1025" y="310" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">notifica</text>
  
  <!-- DB to Status -->
  <line x1="920" y1="430" x2="420" y2="530" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGreen)"/>
  <text x="650" y="485" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#22c55e">consulta status</text>
  
  <!-- Status to LB -->
  <line x1="500" y1="470" x2="1320" y2="270" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="880" y="360" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#FF9900">responde</text>
  
  <!-- Legend -->
  <rect x="60" y="580" width="1480" height="280" rx="8" fill="none" stroke="#666666" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="80" y="605" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF9900">📋 FLUXO DE DADOS</text>
  
  <text x="80" y="640" font-family="Amazon Ember, Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">1️⃣ Autenticação:</text>
  <text x="380" y="640" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Cliente envia credenciais → Auth Service valida JWT</text>
  
  <text x="80" y="670" font-family="Amazon Ember, Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">2️⃣ Upload:</text>
  <text x="380" y="670" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Upload Service recebe vídeo → Armazena em S3 → Envia job para SQS</text>
  
  <text x="80" y="700" font-family="Amazon Ember, Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">3️⃣ Processamento:</text>
  <text x="380" y="700" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Worker consome fila → Processa frames com FFmpeg → Salva em DB</text>
  
  <text x="80" y="730" font-family="Amazon Ember, Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">4️⃣ Compactação:</text>
  <text x="380" y="730" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Zip Service gera arquivo .zip → Armazena em S3 → Notifica usuário</text>
  
  <text x="80" y="760" font-family="Amazon Ember, Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="700">5️⃣ Status:</text>
  <text x="380" y="760" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#cccccc">Cliente consulta Status Service → Retorna progresso em tempo real</text>
  
  <text x="80" y="795" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#FF9900" font-weight="700">💾 Persistência: PostgreSQL | 📦 Cache: Redis | 🪣 Storage: S3 (LocalStack)</text>
  <text x="80" y="825" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#FF9900" font-weight="700">🔄 Escalabilidade: HPA - Horizontal Pod Autoscaler em cada serviço conforme carga de CPU</text>
</svg>
