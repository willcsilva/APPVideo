<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Diagrama de arquitetura do APPVideo">
  <rect width="1400" height="820" fill="#f7f9fc"/>
  <rect x="40" y="40" width="1320" height="740" rx="24" fill="#ffffff" stroke="#d8e1f0" stroke-width="2"/>
  <text x="70" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#132238">Arquitetura do APPVideo</text>
  <text x="70" y="125" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5b6b82">Fluxo distribuído de upload, processamento, compactação e notificação de vídeos</text>

  <rect x="80" y="160" width="1240" height="540" rx="18" fill="#fbfcff" stroke="#e4ebf7" stroke-width="1.5"/>

  <rect x="120" y="200" width="160" height="100" rx="16" fill="#e8f1ff" stroke="#4f7cff" stroke-width="2"/>
  <text x="155" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1b3f8b">Usuário</text>
  <text x="145" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Cliente Web/API</text>

  <rect x="360" y="180" width="180" height="120" rx="16" fill="#eef8f1" stroke="#2fa84f" stroke-width="2"/>
  <text x="395" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#176f3d">Auth Service</text>
  <text x="392" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Autenticação JWT</text>

  <rect x="360" y="330" width="180" height="120" rx="16" fill="#eef8f1" stroke="#2fa84f" stroke-width="2"/>
  <text x="390" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#176f3d">Upload Service</text>
  <text x="387" y="402" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Recebe e armazena vídeo</text>

  <rect x="360" y="480" width="180" height="120" rx="16" fill="#eef8f1" stroke="#2fa84f" stroke-width="2"/>
  <text x="388" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#176f3d">Status Service</text>
  <text x="395" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Health Check</text>

  <rect x="640" y="250" width="180" height="120" rx="16" fill="#fff7e6" stroke="#f2a93b" stroke-width="2"/>
  <text x="675" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#91560f">SQS Queue</text>
  <text x="676" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Mensageria assíncrona</text>

  <rect x="900" y="250" width="180" height="120" rx="16" fill="#f2f0ff" stroke="#7b61ff" stroke-width="2"/>
  <text x="930" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#5b43c8">Video Worker</text>
  <text x="935" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Processamento de frames</text>

  <rect x="900" y="430" width="180" height="120" rx="16" fill="#f2f0ff" stroke="#7b61ff" stroke-width="2"/>
  <text x="945" y="475" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#5b43c8">Zip Service</text>
  <text x="944" y="502" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">Geração do pacote .zip</text>

  <rect x="1120" y="340" width="160" height="100" rx="16" fill="#fff0f2" stroke="#e34f6c" stroke-width="2"/>
  <text x="1145" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#a02d45">Notification</text>
  <text x="1155" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#53627a">E-mail / alertas</text>

  <rect x="250" y="650" width="180" height="90" rx="16" fill="#f8f9fb" stroke="#9aa8bf" stroke-width="2"/>
  <text x="290" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f4c5f">PostgreSQL</text>
  <text x="283" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#53627a">Persistência</text>

  <rect x="470" y="650" width="180" height="90" rx="16" fill="#f8f9fb" stroke="#9aa8bf" stroke-width="2"/>
  <text x="520" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f4c5f">Redis</text>
  <text x="505" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#53627a">Cache</text>

  <rect x="690" y="650" width="180" height="90" rx="16" fill="#f8f9fb" stroke="#9aa8bf" stroke-width="2"/>
  <text x="724" y="690" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#3f4c5f">LocalStack</text>
  <text x="718" y="714" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#53627a">S3 + SQS</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
  </defs>

  <line x1="280" y1="250" x2="360" y2="240" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="240" x2="640" y2="310" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="310" x2="900" y2="310" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1080" y1="310" x2="1120" y2="390" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="370" x2="900" y2="430" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="300" x2="430" y2="330" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="450" x2="430" y2="480" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="390" x2="250" y2="650" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="390" x2="520" y2="650" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="370" x2="760" y2="650" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
