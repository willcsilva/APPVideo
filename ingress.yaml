apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: backend

spec:
  ingressClassName: nginx

  rules:
    - host: app.local
      http:
        paths:

          # ✅ AUTH (precisa rewrite)
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
            # annotation local via ingress-nginx snippet
            # (vamos usar configuração alternativa abaixo)

          # ✅ VIDEOS (NÃO usa rewrite)
          - path: /videos
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3000
