apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: backend

spec:
  ingressClassName: nginx

  rules:
    - host: app.local
      http:
        paths:

          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /videos
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3000
