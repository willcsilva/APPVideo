apiVersion: apps/v1
kind: Deployment
metadata:
  name: zip-service
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zip-service
  template:
    metadata:
      labels:
        app: zip-service
    spec:
      containers:
        - name: zip-service
          image: willcsilva/zip-service:latest

          env:
            - name: NODE_ENV
              value: "stage"

            - name: AWS_REGION
              value: us-east-1

            - name: AWS_ENDPOINT
              value: http://localstack.infra.svc.cluster.local:4566

            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test

            - name: S3_PROCESSED_BUCKET
              value: processed-images

            - name: S3_ZIP_BUCKET
              value: zip-files

            - name: SQS_ZIP_QUEUE
              value: zip-generation

            - name: SQS_ZIP_QUEUE_URL
              value: http://localstack.infra.svc.cluster.local:4566/000000000000/zip-generation

            - name: SQS_NOTIFICATION_QUEUE
              value: notification

            - name: SQS_NOTIFICATION_QUEUE_URL
              value: http://localstack.infra.svc.cluster.local:4566/000000000000/notification

            - name: DB_HOST
              value: postgres.infra.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: video_processor
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: admin123

            - name: LOCAL_FRAMES_DIR
              value: /tmp/zip-input

            - name: LOCAL_ZIP_DIR
              value: /tmp/zips