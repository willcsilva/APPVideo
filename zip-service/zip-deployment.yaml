apiVersion: apps/v1
kind: Deployment

metadata:
  name: zip-service
  namespace: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: zip-service

  template:
    metadata:
      labels:
        app: zip-service

    spec:
      containers:
        - name: zip-service

          image: willcsilva/zip-service:latest
          imagePullPolicy: Always

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "1000m"
              memory: "512Mi"

          env:
            # - name: NODE_ENV
            #   value: "stage"
            
            - name: NODE_ENV
              value: "production"

            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AWS_REGION

            # - name: AWS_ENDPOINT
            #   value: "http://localstack.infra.svc.cluster.local:4566"

            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_SECRET_ACCESS_KEY

            # - name: S3_PROCESSED_BUCKET
            #   value: "processed-images"

            # - name: S3_ZIP_BUCKET
            #   value: "zip-files"

            # - name: SQS_ZIP_QUEUE
            #   value: "zip-generation"

            # - name: SQS_ZIP_QUEUE_URL
            #   value: "http://localstack.infra.svc.cluster.local:4566/000000000000/zip-generation"

            # - name: SQS_NOTIFICATION_QUEUE
            #   value: "notification"

            # - name: SQS_NOTIFICATION_QUEUE_URL
            #   value: "http://localstack.infra.svc.cluster.local:4566/000000000000/notification"

            - name: S3_PROCESSED_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_PROCESSED_BUCKET

            - name: S3_ZIP_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: S3_ZIP_BUCKET

            - name: SQS_ZIP_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SQS_ZIP_QUEUE_URL

            - name: SQS_NOTIFICATION_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SQS_NOTIFICATION_QUEUE_URL

            # - name: DB_HOST
            #   value: "postgres.infra.svc.cluster.local"

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST

            - name: DB_PORT
              value: "5432"

            # - name: DB_NAME
            #   value: "video_processor"

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD

            - name: LOCAL_FRAMES_DIR
              value: "/tmp/zip-input"

            - name: LOCAL_ZIP_DIR
              value: "/tmp/zips"

            - name: NEW_RELIC_APP_NAME
              value: zip-service

            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: NEW_RELIC_LICENSE_KEY