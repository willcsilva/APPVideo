apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: app-ingress
  namespace: backend

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

spec:
  ingressClassName: nginx

  rules:
    - host: app.local

      http:
        paths:

          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /videos
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3000

          - path: /status
            pathType: Prefix
            backend:
              service:
                name: status-service
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-ui
                port:
                  number: 80