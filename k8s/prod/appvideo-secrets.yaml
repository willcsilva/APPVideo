apiVersion: v1
kind: Secret

metadata:
  name: app-secrets
  namespace: backend

type: Opaque

stringData:
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}

  JWT_SECRET: ${JWT_SECRET}

  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

  NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}