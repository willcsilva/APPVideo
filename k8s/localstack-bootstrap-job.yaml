apiVersion: batch/v1
kind: Job

metadata:
  name: localstack-bootstrap
  namespace: infra

spec:
  template:
    spec:
      restartPolicy: Never

      containers:
        - name: bootstrap

          image: localstack/localstack:latest

          command:
            - /bin/sh
            - -c
            - |
              echo "Aguardando LocalStack..."

              sleep 15

              echo "Criando buckets..."

              awslocal s3 mb s3://raw-videos || true
              awslocal s3 mb s3://processed-images || true
              awslocal s3 mb s3://zip-files || true

              echo "Criando filas..."

              awslocal sqs create-queue \
                --queue-name video-processing || true

              awslocal sqs create-queue \
                --queue-name zip-generation || true

              awslocal sqs create-queue \
                --queue-name notification || true

              echo "Bootstrap concluído"