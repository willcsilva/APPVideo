name: CI/CD Pipeline

on:
  push:
    branches: ["main", "stage"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres-auth-test:
        image: postgres:15
        env:
          POSTGRES_DB: video_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U test -d video_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # -------------------------
      # AUTH SERVICE
      # -------------------------
      - name: Install deps (auth-service)
        run: |
          cd auth-service
          npm install
    

      - name: Aguardar Postgres de teste
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5433 -U test -d video_test && break
            echo "Aguardando PostgreSQL..."
            sleep 2
          done
        env:
          PGPASSWORD: test123

      - name: Criar schema do auth-service (teste)
        run: |
          PGPASSWORD=test123 psql -h localhost -p 5433 -U test -d video_test <<'SQL'
          CREATE TABLE IF NOT EXISTS users (
            id UUID PRIMARY KEY,
            email TEXT NOT NULL UNIQUE,
            password_hash TEXT NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          SQL

      - name: Run tests (auth-service)
        run: |
          cd auth-service
          npm test

      # -------------------------
      # UPLOAD SERVICE
      # -------------------------
      - name: Install deps (upload-service)
        run: |
          cd upload-service
          npm install

      # Se você ainda não tiver testes implementados no upload-service,
      # deixe comentado até concluir
      - name: Run tests (upload-service)
        run: |
          cd upload-service
          npm test || echo "Sem testes estáveis no upload-service ainda"

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Definir tag da imagem
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      # BUILD AUTH
      # -------------------------
      - name: Build e Push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            willcsilva/auth-service:latest
            willcsilva/auth-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      # -------------------------
      # BUILD UPLOAD
      # -------------------------
      - name: Build e Push upload-service
        uses: docker/build-push-action@v6
        with:
          context: ./upload-service
          push: true
          tags: |
            willcsilva/upload-service:latest
            willcsilva/upload-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      # -------------------------
      # BUILD WORKERS
      # -------------------------
      - name: Build e Push video-worker
        uses: docker/build-push-action@v6
        with:
          context: ./video-processor-worker
          push: true
          tags: |
            willcsilva/video-worker:latest
            willcsilva/video-worker:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      - name: Build e Push zip-service
        uses: docker/build-push-action@v6
        with:
          context: ./zip-service
          push: true
          tags: |
            willcsilva/zip-service:latest
            willcsilva/zip-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      - name: Build e Push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: true
          tags: |
            willcsilva/notification-service:latest
            willcsilva/notification-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

  deploy-on-premise:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar kubeconfig (on-premise)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_ON_PREMISE }}" > $HOME/.kube/config

      - name: Deploy no Kubernetes
        run: |
            kubectl apply -f postgres-deployment.yaml
            kubectl apply -f postgres-service.yaml
            kubectl apply -f redis-deployment.yaml
            kubectl apply -f redis-service.yaml
            kubectl apply -f localstack-deployment.yaml
            kubectl apply -f localstack-service.yaml

      - name: Atualizar imagens com tag SHA
        run: |
          kubectl set image deployment/auth-service auth-service=willcsilva/auth-service:${{ needs.docker-build-and-push.outputs.tag }} -n backend
          kubectl set image deployment/upload-service upload-service=willcsilva/upload-service:${{ needs.docker-build-and-push.outputs.tag }} -n backend
          kubectl set image deployment/video-worker worker=willcsilva/video-worker:${{ needs.docker-build-and-push.outputs.tag }} -n backend
          kubectl set image deployment/zip-service zip-service=willcsilva/zip-service:${{ needs.docker-build-and-push.outputs.tag }} -n backend
          kubectl set image deployment/notification-service notification-service=willcsilva/notification-service:${{ needs.docker-build-and-push.outputs.tag }} -n backend

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/auth-service -n backend
          kubectl rollout status deployment/upload-service -n backend
          kubectl rollout status deployment/video-worker -n backend
          kubectl rollout status deployment/zip-service -n backend
          kubectl rollout status deployment/notification-service -n backend