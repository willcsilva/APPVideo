name: CI/CD Pipeline

on:
  push:
    branches: ["stage"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # -------------------------
      # AUTH SERVICE
      # -------------------------
      - name: Install deps (auth-service)
        run: |
          cd auth-service
          npm install

      - name: Run tests (auth-service)
        run: |
          cd auth-service
          npm test

      # -------------------------
      # UPLOAD SERVICE
      # -------------------------
      - name: Install deps (upload-service)
        run: |
          cd upload-service
          npm install

      - name: Run tests (upload-service)
        run: |
          cd upload-service
          npm test

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ✅ gerar tag baseada no commit
      - name: Definir tag da imagem
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      # BUILD AUTH
      # -------------------------
      - name: Build e Push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            willcsilva/auth-service:latest
            willcsilva/auth-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      # -------------------------
      # BUILD UPLOAD
      # -------------------------
      - name: Build e Push upload-service
        uses: docker/build-push-action@v6
        with:
          context: ./upload-service
          push: true
          tags: |
            willcsilva/upload-service:latest
            willcsilva/upload-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      # -------------------------
      # BUILD WORKERS
      # -------------------------
      - name: Build e Push video-worker
        uses: docker/build-push-action@v6
        with:
          context: ./video-processor-worker
          push: true
          tags: |
            willcsilva/video-worker:latest
            willcsilva/video-worker:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      - name: Build e Push zip-service
        uses: docker/build-push-action@v6
        with:
          context: ./zip-service
          push: true
          tags: |
            willcsilva/zip-service:latest
            willcsilva/zip-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

      - name: Build e Push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: true
          tags: |
            willcsilva/notification-service:latest
            willcsilva/notification-service:${{ steps.vars.outputs.TAG }}
          platforms: linux/amd64

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ✅ usar kubeconfig do cluster on-premise
      - name: Configurar kubeconfig (on-premise)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_ON_PREMISE }}" > $HOME/.kube/config

      # ✅ aplicar manifests
      - name: Deploy no Kubernetes
        run: |
          kubectl apply -f k8s/

      # ✅ atualizar imagens com versão SHA
      - name: Atualizar imagens
        run: |
          kubectl set image deployment/auth-service auth-service=willcsilva/auth-service:${{ steps.vars.outputs.TAG }} -n backend
          kubectl set image deployment/upload-service upload-service=willcsilva/upload-service:${{ steps.vars.outputs.TAG }} -n backend
          kubectl set image deployment/video-worker worker=willcsilva/video-worker:${{ steps.vars.outputs.TAG }} -n backend
          kubectl set image deployment/zip-service zip-service=willcsilva/zip-service:${{ steps.vars.outputs.TAG }} -n backend
          kubectl set image deployment/notification-service notification-service=willcsilva/notification-service:${{ steps.vars.outputs.TAG }} -n backend

      # ✅ rollout automático (produção real)
      - name: Verificar rollout
        run: |
          kubectl rollout status deployment/auth-service -n backend
          kubectl rollout status deployment/upload-service -n backend
          kubectl rollout status deployment/video-worker -n backend
          kubectl rollout status deployment/zip-service -n backend
          kubectl rollout status deployment/notification-service -n backend